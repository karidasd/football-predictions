name: Morning Predictions

on:
  schedule:
    # Run at 06:17 UTC every day to avoid GitHub Actions queue delays
    - cron: '17 6 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  predict:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Predictions Script
      env:
        API_FOOTBALL_KEY: "38f1c8e59dd3c061104a4ffd98f0fe1e"
      run: |
        python scripts/fetch_predictions.py

    - name: Commit and Push Changes
      uses: stefanzweifel/git-auto-commit-action@v4
      with:
        commit_message: "Automated daily predictions update"
        file_pattern: "data/*.json"
