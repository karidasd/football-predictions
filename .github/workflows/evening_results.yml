name: Evening Results

on:
  schedule:
    # Run at 23:00 UTC every day
    - cron: '0 23 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  fetch_results:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Results Script
      env:
        API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
      run: |
        python scripts/fetch_results.py

    - name: Commit and Push Changes
      uses: stefanzweifel/git-auto-commit-action@v4
      with:
        commit_message: "Automated daily results and history update"
        file_pattern: "data/predictions.json data/history.json"
